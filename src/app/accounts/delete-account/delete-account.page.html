<header class="mb-3">
  <h1 class="text-2xl font-bold mb-1">Delete Account</h1>
  <p class="text-gray-500 mb-2">Permanently delete your account and all associated data.</p>
</header>

<div class="w-full sm:max-w-screen-sm mx-auto px-3">
  <div class="rounded border border-red-300 bg-red-50 p-4 mb-6 text-sm text-red-700">
    <strong>Warning:</strong> This action is permanent and cannot be undone. All your data will be deleted immediately.
  </div>

  <div class="flex flex-col gap-3">
    <button mat-flat-button color="warn" type="button" (click)="confirm()">
      Delete My Account
    </button>
    <button mat-stroked-button type="button" (click)="cancel()">
      Cancel
    </button>
  </div>
</div>
