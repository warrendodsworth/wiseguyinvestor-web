<header class="mb-4">
  <h2>
    Users <ng-container *ngIf="users$ | async as users1">{{ users1?.length || '' }} </ng-container>
  </h2>
</header>

@if (users$ | async; as users1) {
  <div class="flex flex-col gap-1">
    @for (item of users1; track $index) {
      <app-user-item [user]="item" [adminView]="true" [showFullName]="true"></app-user-item>
    }
  </div>
}
