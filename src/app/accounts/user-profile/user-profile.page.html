<div
  class="flex flex-col items-center w-full max-w-screen-md mx-auto py-8 px-4 bg-white dark:bg-gray-800 rounded-lg shadow"
>
  @if (user(); as u) {
    <div class="mb-3">
      <app-show-photo [url]="u.photoURL"></app-show-photo>
    </div>

    <div class="w-full text-center mb-2">
      <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-200">{{ u.displayName }}</h2>

      <p class="text-gray-500 dark:text-gray-400 text-sm">{{ u.email }}</p>

      @if (u.roles.admin) {
        <p class="text-sm text-gray-500 dark:text-gray-400 ml-2">{{ util.toKeys(u.roles) }}</p>
      }
    </div>

    <div class="w-full flex flex-col gap-2 mt-4">
      @if (u.bio) {
        <p class="text-gray-700 dark:text-gray-300 text-base">{{ u.bio }}</p>
      }

      @if (u.address) {
        <p class="text-gray-400 dark:text-gray-500 text-sm">{{ u.address }}</p>
      }

      <!-- Add more fields as needed -->
    </div>

    @if (canEdit()) {
      <a
        [routerLink]="['/accounts/users', user()?.id, 'edit']"
        class="mt-6 px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition-colors inline-block text-center"
      >
        Edit Profile
      </a>
    }
  }
</div>
