@if (!working()) {
<header class="mb-6">
  <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-2">
    <a [routerLink]="['/blog']" class="hover:text-gray-900 dark:hover:text-white transition-colors">Blog</a>
    <span class="material-symbols-rounded text-sm">chevron_right</span>
    <a [routerLink]="['/blog/posts']" class="hover:text-gray-900 dark:hover:text-white transition-colors">Posts</a>
    <span class="material-symbols-rounded text-sm">chevron_right</span>
    <span class="text-gray-900 dark:text-white">{{ model?.id ? 'Edit' : 'New' }}</span>
  </nav>
  <h3 class="text-xl font-bold text-gray-900 dark:text-white">{{ model?.id ? 'Edit' : 'New' }} Post</h3>
</header>
}

<div class="w-full sm:max-w-screen-sm mx-auto mb-6">
  <form [formGroup]="form" (submit)="save(model)">
    <formly-form [model]="model" [fields]="postFields" [options]="options"></formly-form>

    <div class="text-center mt-3">
      <button [disabled]="form.invalid" type="submit" class="button-primary">Save</button>
    </div>
  </form>
</div>
