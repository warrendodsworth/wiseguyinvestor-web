@if (post(); as p) {
  <div
    class="flex flex-col bg-white dark:bg-gray-900 rounded-xl overflow-hidden shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-md transition-shadow duration-200 h-full group"
  >
    <!-- Thumbnail -->
    <a [routerLink]="['/blog/posts', p.id]" class="block overflow-hidden h-44 shrink-0 bg-gray-100 dark:bg-gray-800">
      <img
        [src]="p.photoURL"
        [alt]="p.title"
        [title]="p.title"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
        ngOptimizedImage
        width="400"
        height="176"
      />
    </a>

    <div class="p-5 flex flex-col flex-1">
      <!-- Category + read time -->
      <div class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400 mb-3">
        @if (p.category) {
          <span class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full px-3 py-0.5">
            {{ p.category }}
          </span>
          <span>·</span>
        }
        <span>{{ readTime() }} min read</span>
        @if (p.draft) {
          <span class="text-yellow-600 dark:text-yellow-400 font-semibold ml-1">Draft</span>
        }
      </div>

      <!-- Title -->
      <h2 class="text-lg font-bold text-gray-900 dark:text-white leading-snug mb-2">
        <a
          [routerLink]="['/blog/posts', p.id]"
          class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors"
        >
          {{ p.title }}
        </a>
      </h2>

      <!-- Excerpt -->
      <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-3 mb-4 flex-1">{{ excerpt() }}</p>

      <!-- Author row -->
      <div class="flex items-center gap-2 pt-3 border-t border-gray-100 dark:border-gray-800">
        @if (p.authorPhotoURL) {
          <img
            [src]="p.authorPhotoURL"
            [alt]="p.authorName"
            [title]="p.authorName"
            class="w-6 h-6 rounded-full object-cover"
            ngOptimizedImage
            width="24"
            height="24"
          />
        } @else {
          <div class="w-6 h-6 rounded-full bg-linear-to-br from-blue-400 to-indigo-600 shrink-0"></div>
        }
        <span class="text-xs text-gray-500 dark:text-gray-400">
          {{ p.authorName || 'Author' }} · {{ toDate(p.createDate) | date: 'MMM d, y' }}
        </span>
      </div>
    </div>
  </div>
}
